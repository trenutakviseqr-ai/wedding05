<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klara & Bruno 💍</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(#fffaf5,#f3e5d8);
  text-align:center;
}

/* LOGIN */
#login{
  position:fixed;
  width:100%; height:100%;
  background:url("hero.jpg") center/cover;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  color:white; z-index:999;
}

/* HERO */
.hero{
  background:url("hero1.jpg") center/cover;
  height:50vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
  padding:15px;
}
.gallery img,.gallery video{
  width:100%;
  border-radius:12px;
  cursor:pointer;
  transition:transform .3s;
}
.gallery img:hover{
  transform:scale(1.05);
}

/* VIEWER */
#viewer{
  position:fixed;
  width:100%; height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:1000;
  animation:fadeIn .3s;
}

#viewer img,#viewer video{
  max-width:90%;
  max-height:80%;
  border-radius:10px;
  animation:zoom .3s;
}

.arrow{
  position:absolute;
  top:50%;
  font-size:40px;
  color:white;
  cursor:pointer;
  user-select:none;
}
.left{ left:20px; }
.right{ right:20px; }

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

/* ANIMATIONS */
@keyframes fadeIn{
  from{opacity:0} to{opacity:1}
}
@keyframes zoom{
  from{transform:scale(.8)} to{transform:scale(1)}
}

/* BUTTON */
button{
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#c6a46c,#e8c88a);
  color:white;
  margin:10px;
}

input{
  padding:12px;
  border-radius:25px;
  border:none;
  margin:10px;
}

/* HEARTS */
.heart{
  position:fixed;
  bottom:-20px;
  color:white;
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  from{transform:translateY(0)}
  to{transform:translateY(-120vh)}
}
</style>
</head>

<body>

<div id="login">
  <h1>Klara & Bruno 💍</h1>
  <input type="password" id="pass" placeholder="Lozinka">
  <button onclick="enter()">Uđi</button>
</div>

<div class="hero">
  <h1>Klara & Bruno</h1>
</div>

<input type="text" id="username" placeholder="Vaše ime"><br>
<button onclick="upload()">📸 Upload</button>
<button onclick="downloadAll()">📦 Preuzmi sve</button>

<input type="file" id="file" multiple accept="image/*,video/*" hidden>

<div id="gallery" class="gallery"></div>

<!-- VIEWER -->
<div id="viewer">
  <span class="close" onclick="closeViewer()">✖</span>
  <span class="arrow left" onclick="prev()">⬅</span>
  <span class="arrow right" onclick="next()">➡</span>

  <img id="viewerImg">
  <video id="viewerVideo" controls></video>
</div>

<audio id="music" loop>
  <source src="paulyudin-wedding-485932.mp3">
</audio>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCuLdrkcZ2JVSZ78I5b6H8waU-IPMyCjwI",
  authDomain: "trenutakviseqr-9d521.firebaseapp.com",
  projectId: "trenutakviseqr-9d521",
  storageBucket: "trenutakviseqr-9d521.firebasestorage.app",
  messagingSenderId: "578545655511",
  appId: "1:578545655511:web:4ee1996961004f783eda92"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let allMedia=[];
let currentIndex=0;

/* LOGIN */
function enter(){
  if(pass.value==="svadba2026"){
    login.style.display="none";
    music.play().catch(()=>{});
    loadGallery();
    startHearts();
  }
}

/* RESIZE + WATERMARK */
function resizeImage(file){
  return new Promise(resolve=>{
    const img=new Image();
    const reader=new FileReader();

    reader.onload=e=>{
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        let max=1600,w=img.width,h=img.height;

        if(w>max||h>max){
          if(w>h){h*=max/w;w=max;}
          else{w*=max/h;h=max;}
        }

        canvas.width=w; canvas.height=h;
        let ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);

        ctx.fillStyle="rgba(255,255,255,0.5)";
        ctx.font="30px Playfair Display";
        ctx.fillText("Klara & Bruno",20,h-30);

        canvas.toBlob(blob=>{
          resolve(new File([blob],file.name,{type:"image/jpeg"}));
        },"image/jpeg",0.8);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* UPLOAD */
function upload(){ file.click(); }

file.addEventListener("change", async e=>{
  let name=username.value||"Gost";

  for(let f of e.target.files){
    let uploadFile=f;

    if(f.type.startsWith("image")){
      uploadFile=await resizeImage(f);
    }

    let ref=storage.ref("wedding/"+Date.now()+"_"+f.name);
    await ref.put(uploadFile);
    let url=await ref.getDownloadURL();

    await db.collection("photos").add({
      url,name,type:f.type,created:Date.now()
    });
  }
});

/* LOAD */
function loadGallery(){
  db.collection("photos")
    .onSnapshot(snap=>{
      gallery.innerHTML="";
      allMedia=[];

      snap.forEach((doc,i)=>{
        let d=doc.data();
        allMedia.push(d);

        let el=d.type.startsWith("video")
          ? document.createElement("video")
          : document.createElement("img");

        el.src=d.url;
        el.onclick=()=>openViewer(i);

        gallery.appendChild(el);
      });
    });
}

/* VIEWER */
function openViewer(i){
  currentIndex=i;
  let d=allMedia[i];

  viewer.style.display="flex";

  if(d.type.startsWith("video")){
    viewerVideo.style.display="block";
    viewerImg.style.display="none";
    viewerVideo.src=d.url;
  }else{
    viewerImg.style.display="block";
    viewerVideo.style.display="none";
    viewerImg.src=d.url;
  }
}

function closeViewer(){
  viewer.style.display="none";
  viewerVideo.pause();
}

/* NAVIGATION */
function next(){
  currentIndex=(currentIndex+1)%allMedia.length;
  openViewer(currentIndex);
}
function prev(){
  currentIndex=(currentIndex-1+allMedia.length)%allMedia.length;
  openViewer(currentIndex);
}

/* SWIPE */
let startX=0;
viewer.addEventListener("touchstart",e=> startX=e.touches[0].clientX);
viewer.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  if(startX-endX>50) next();
  if(endX-startX>50) prev();
});

/* DOWNLOAD */
async function downloadAll(){
  let snap=await db.collection("photos").get();
  snap.forEach(doc=>{
    window.open(doc.data().url);
  });
}

/* HEARTS */
function startHearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="❤";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),8000);
  },500);
}
</script>

</body>
</html>
