<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klara & Bruno 💍</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(#fffaf5,#f3e5d8);
  text-align:center;
}

/* LOGIN */
#login{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:url("hero.jpg") center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  z-index:999;
}

/* HERO */
.hero{
  background:url("hero1.jpg") center/cover;
  height:50vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
}

/* BUTTONS */
button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#c6a46c,#e8c88a);
  color:white;
  margin:10px;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  gap:10px;
  padding:15px;
}

.gallery img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

/* LIGHTBOX */
#lightbox{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

#lightbox img{
  max-width:90%;
  max-height:80%;
}

/* PROGRESS */
#progress{
  width:80%;
  margin:10px auto;
  display:none;
}
</style>
</head>

<body>

<div id="login">
  <h1>Klara & Bruno 💍</h1>
  <input type="password" id="pass" placeholder="Lozinka">
  <button onclick="enter()">Uđi</button>
</div>

<div class="hero">
  <h1>Klara & Bruno</h1>
  <p>Hvala što ste dio našeg dana 💛</p>
</div>

<input type="text" id="username" placeholder="Vaše ime">
<br>
<button onclick="upload()">📸 Dodaj slike</button>
<button onclick="downloadAll()">📦 Preuzmi sve</button>

<progress id="progress" value="0" max="100"></progress>

<input type="file" id="file" multiple accept="image/*" hidden>

<div class="gallery" id="gallery"></div>

<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<audio id="music" loop>
  <source src="paulyudin-wedding-485932.mp3">
</audio>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "trenutakviseqr-9d521.firebaseapp.com",
  projectId: "trenutakviseqr-9d521",
  storageBucket: "trenutakviseqr-9d521.appspot.com",
  appId: "1:578545655511:web:4ee1996961004f783eda92"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let images = [];
let current = 0;

/* LOGIN */
function enter(){
  let p = document.getElementById("pass").value;
  if(p === "svadba2026"){
    document.getElementById("login").style.display="none";
    document.getElementById("music").play();
    loadGallery();
  } else {
    alert("Pogrešna lozinka");
  }
}

/* UPLOAD */
function upload(){
  document.getElementById("file").click();
}

file.addEventListener("change", async e=>{
  let files = [...e.target.files].slice(0,10);
  let progress = document.getElementById("progress");
  progress.style.display = "block";

  for(let i=0;i<files.length;i++){
    let f = files[i];

    let ref = storage.ref("wedding/"+Date.now()+"_"+f.name);
    let task = ref.put(f);

    task.on("state_changed", snap=>{
      let percent = (snap.bytesTransferred / snap.totalBytes)*100;
      progress.value = percent;
    });

    await task;
    let url = await ref.getDownloadURL();

    await db.collection("photos").add({
      url, created: Date.now()
    });
  }

  progress.style.display = "none";
});

/* LOAD (OPTIMIZED) */
function loadGallery(){
  db.collection("photos")
    .orderBy("created","desc")
    .limit(200)
    .onSnapshot(snap=>{
      gallery.innerHTML="";
      images=[];

      snap.forEach(doc=>{
        let d = doc.data();
        images.push(d.url);

        let img=document.createElement("img");
        img.src=d.url;
        img.loading="lazy";

        img.onclick=()=>{
          current = images.indexOf(d.url);
          openLightbox();
        };

        gallery.appendChild(img);
      });
    });
}

/* LIGHTBOX */
function openLightbox(){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src = images[current];
}

function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}

/* DOWNLOAD ALL */
async function downloadAll(){
  let snap = await db.collection("photos").limit(100).get();
  snap.forEach(doc=>{
    window.open(doc.data().url);
  });
}
</script>

</body>
</html>
