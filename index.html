<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST</title>
</head>

<body>

<h2>Test upload</h2>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<div id="gallery"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCuLdrkcZ2JVSZ78I5b6H8waU-IPMyCjwI",
  authDomain: "trenutakviseqr-9d521.firebaseapp.com",
  projectId: "trenutakviseqr-9d521",
  storageBucket: "trenutakviseqr-9d521.firebasestorage.app",
  appId: "1:578545655511:web:4ee1996961004f783eda92"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

/* UPLOAD */
async function upload(){
  let f = file.files[0];
  if(!f) return alert("odaberi file");

  console.log("upload start");

  let ref = storage.ref("test/"+Date.now()+"_"+f.name);
  await ref.put(f);

  let url = await ref.getDownloadURL();

  await db.collection("photos").add({
    url:url,
    created:Date.now()
  });

  console.log("upload done");
}

/* LOAD */
db.collection("photos").onSnapshot(snap=>{
  gallery.innerHTML="";
  snap.forEach(doc=>{
    let img = document.createElement("img");
    img.src = doc.data().url;
    img.style.width="100px";
    gallery.appendChild(img);
  });
});
</script>

</body>
</html>
