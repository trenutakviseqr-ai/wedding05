<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klara & Bruno 💍</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(#fffaf5,#f3e5d8);
  text-align:center;
}

#login{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:url("hero.jpg") center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  z-index:999;
}

.hero{
  background:url("hero1.jpg") center/cover;
  height:40vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#c6a46c,#e8c88a);
  color:white;
  margin:10px;
  cursor:pointer;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  gap:10px;
  padding:15px;
}

.gallery img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

#lightbox{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#lightbox img{
  max-width:90%;
  max-height:80%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h1>Klara & Bruno 💍</h1>
  <input type="password" id="pass" placeholder="Lozinka">
  <button onclick="enter()">Uđi</button>
</div>

<div class="hero">
  <h1>Klara & Bruno</h1>
  <p>Podijelite uspomene 💛</p>
</div>

<input type="text" id="username" placeholder="Vaše ime">
<br>

<button onclick="upload()">📸 Dodaj slike</button>
<button onclick="downloadAll()">📦 Preuzmi sve</button>

<input type="file" id="file" multiple accept="image/*" hidden>

<div class="gallery" id="gallery"></div>

<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<audio id="music" loop>
  <source src="paulyudin-wedding-485932.mp3">
</audio>

<script>

/* SUPABASE INIT (SAMO JEDNOM!) */
const client = window.supabase.createClient(
  "https://pfjqfnqpqljlsytjnsrw.supabase.co",
  "sb_publishable_sDCNISDGhcLJPBamCpJ5BA_fkpcVRtZ"
);

let images = [];
let current = 0;

/* LOGIN */
function enter(){
  const p = document.getElementById("pass").value;

  if(p === "svadba2026"){
    document.getElementById("login").style.display="none";
    document.getElementById("music").play();
    loadGallery();
  } else {
    alert("Pogrešna lozinka");
  }
}

/* UPLOAD */
function upload(){
  document.getElementById("file").click();
}

document.getElementById("file").addEventListener("change", async (e)=>{

  let files = Array.from(e.target.files).slice(0,10);

  for(let file of files){

    let filename = Date.now() + "_" + file.name;

    await client.storage
      .from("photos")
      .upload(filename, file);

    let { data } = client.storage
      .from("photos")
      .getPublicUrl(filename);

    await client.from("photos").insert({
      url: data.publicUrl,
      created_at: new Date().toISOString()
    });
  }

  loadGallery();
});

/* LOAD */
async function loadGallery(){

  const { data } = await client
    .from("photos")
    .select("*")
    .order("created_at", { ascending:false });

  const gallery = document.getElementById("gallery");
  gallery.innerHTML="";
  images=[];

  if(!data) return;

  data.forEach(d => {

    images.push(d.url);

    let img=document.createElement("img");
    img.src=d.url;
    img.loading="lazy";

    img.onclick=()=>{
      current = images.indexOf(d.url);
      openLightbox();
    };

    gallery.appendChild(img);
  });
}

/* LIGHTBOX */
function openLightbox(){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src = images[current];
}

function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}

/* DOWNLOAD */
async function downloadAll(){

  const { data } = await client
    .from("photos")
    .select("url");

  if(!data) return;

  data.forEach(d=>{
    let a = document.createElement("a");
    a.href = d.url;
    a.download = "slika";
    a.click();
  });
}

</script>

</body>
</html>
