<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klara & Bruno 💍</title>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  background:#fffaf5;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
  padding:10px;
}

.gallery img,.gallery video{
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

#viewer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

#viewer img,#viewer video{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<h2>Klara & Bruno 💛</h2>

<input type="text" id="username" placeholder="Vaše ime"><br>
<button onclick="upload()">Upload</button>
<button onclick="downloadAll()">Preuzmi sve</button>

<input type="file" id="file" multiple hidden>

<div id="gallery" class="gallery"></div>

<div id="viewer" onclick="this.style.display='none'">
  <img id="viewerImg">
  <video id="viewerVideo" controls></video>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCuLdrkcZ2JVSZ78I5b6H8waU-IPMyCjwI",
  authDomain: "trenutakviseqr-9d521.firebaseapp.com",
  projectId: "trenutakviseqr-9d521",
  storageBucket: "trenutakviseqr-9d521.firebasestorage.app",
  messagingSenderId: "578545655511",
  appId: "1:578545655511:web:4ee1996961004f783eda92"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

/* LOAD */
function loadGallery(){
  db.collection("photos").onSnapshot(snapshot=>{
    gallery.innerHTML="";
    snapshot.forEach(doc=>{
      let d = doc.data();

      let el;
      if(d.type && d.type.startsWith("video")){
        el=document.createElement("video");
        el.src=d.url;
      }else{
        el=document.createElement("img");
        el.src=d.url;
      }

      el.onclick=()=>openViewer(d);
      gallery.appendChild(el);
    });
  });
}

/* VIEWER */
function openViewer(d){
  viewer.style.display="flex";

  if(d.type && d.type.startsWith("video")){
    viewerVideo.style.display="block";
    viewerImg.style.display="none";
    viewerVideo.src=d.url;
  }else{
    viewerImg.style.display="block";
    viewerVideo.style.display="none";
    viewerImg.src=d.url;
  }
}

/* UPLOAD */
function upload(){
  file.click();
}

file.addEventListener("change", async e=>{
  let name=username.value || "Gost";

  for(let f of e.target.files){
    let ref = storage.ref("wedding/"+Date.now()+"_"+f.name);
    await ref.put(f);
    let url = await ref.getDownloadURL();

    await db.collection("photos").add({
      url:url,
      name:name,
      type:f.type,
      created:Date.now()
    });
  }
});

/* DOWNLOAD */
async function downloadAll(){
  let snap = await db.collection("photos").get();
  snap.forEach(doc=>{
    window.open(doc.data().url);
  });
}

/* INIT */
loadGallery();
</script>

</body>
</html>
