<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klara & Bruno 💍</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#fdf8f3;
color:#5a4636;
overflow-x:hidden;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
background:url("hero.jpg") center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
color:white;
text-align:center;
backdrop-filter:blur(6px);
}

#login input{
padding:12px;
border-radius:25px;
border:none;
margin-top:15px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#c6a46c,#e8c88a);
color:white;
margin:10px;
cursor:pointer;
}

/* HERO */
.hero{
background:url("hero1.jpg") center/cover;
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:12px;
padding:20px;
}

.gallery img,.gallery video{
width:100%;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}
.gallery img:hover{
transform:scale(1.05);
}

/* LIGHTBOX SWIPE */
#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

#lightbox img,#lightbox video{
max-width:90%;
max-height:80%;
}

/* ANIMATIONS */
.heart, .balloon{
position:fixed;
bottom:-50px;
animation:floatUp linear infinite;
}

.heart{
color:white;
font-size:20px;
}

.balloon{
width:15px;
height:20px;
background:#e8c88a;
border-radius:50%;
}

@keyframes floatUp{
from{transform:translateY(0)}
to{transform:translateY(-120vh)}
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h1>Klara & Bruno 💍</h1>
<p>Dobrodošli na naš dan 💛</p>
<input type="password" id="pass" placeholder="Lozinka">
<button onclick="enter()">Uđi</button>
</div>

<!-- HERO -->
<div class="hero">
<h1>Klara & Bruno</h1>
<p>Hvala što ste dio našeg najljepšeg dana 💛</p>
</div>

<div style="text-align:center;padding:20px;">
<input type="text" id="username" placeholder="Vaše ime">
<br>
<button onclick="upload()">📸 Dodaj slike/video</button>
<button onclick="downloadAll()">📦 Preuzmi sve</button>
</div>

<input type="file" id="file" multiple accept="image/*,video/*" hidden>

<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
<div id="viewer"></div>
</div>

<audio id="music" loop>
<source src="paulyudin-wedding-485932.mp3">
</audio>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCuLdrkcZ2JVSZ78I5b6H8waU-IPMyCjwI",
authDomain: "trenutakviseqr-9d521.firebaseapp.com",
projectId: "trenutakviseqr-9d521",
storageBucket: "trenutakviseqr-9d521.firebasestorage.app",
messagingSenderId: "578545655511",
appId: "1:578545655511:web:4ee1996961004f783eda92"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

/* LOGIN */
function enter(){
if(document.getElementById("pass").value==="svadba2026"){
document.getElementById("login").style.display="none";
document.getElementById("music").play();
loadGallery();
createEffects();
}
}

/* UPLOAD */
function upload(){
document.getElementById("file").click();
}

document.getElementById("file").addEventListener("change", async (e)=>{
let files = e.target.files;
let name = document.getElementById("username").value || "Gost";

for(let file of files){
let ref = storage.ref("wedding/"+Date.now()+"_"+file.name);
await ref.put(file);
let url = await ref.getDownloadURL();

await db.collection("photos").add({
url:url,
name:name,
likes:0,
type:file.type,
created:Date.now()
});
}
});

/* LOAD */
function loadGallery(){
db.collection("photos").orderBy("created","desc")
.onSnapshot(snapshot=>{
gallery.innerHTML="";

snapshot.forEach(doc=>{
let d=doc.data();

let el;

if(d.type.startsWith("video")){
el=document.createElement("video");
el.src=d.url;
}else{
el=document.createElement("img");
el.src=d.url;
}

el.onclick=()=>openLightbox(d);

let wrap=document.createElement("div");

let like=document.createElement("button");
like.innerText="❤️ "+d.likes;
like.onclick=()=>{
db.collection("photos").doc(doc.id).update({likes:d.likes+1});
}

let down=document.createElement("a");
down.href=d.url;
down.download="file";
down.innerText="⬇️";

let name=document.createElement("p");
name.innerText=d.name;

wrap.append(el,name,like,down);
gallery.appendChild(wrap);
});
});
}

/* LIGHTBOX SWIPE */
let currentIndex=0;
let items=[];

function openLightbox(data){
items=[...document.querySelectorAll(".gallery img,.gallery video")];
currentIndex=items.findIndex(el=>el.src===data.url);

showSlide();
lightbox.style.display="flex";
}

function showSlide(){
viewer.innerHTML="";
let el=items[currentIndex].cloneNode(true);
el.controls=true;
viewer.appendChild(el);
}

document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowRight"){currentIndex++; if(currentIndex>=items.length) currentIndex=0; showSlide();}
if(e.key==="ArrowLeft"){currentIndex--; if(currentIndex<0) currentIndex=items.length-1; showSlide();}
});

function closeLightbox(){
lightbox.style.display="none";
}

/* DOWNLOAD ALL (fallback) */
async function downloadAll(){
let snap=await db.collection("photos").get();
snap.forEach(doc=>{
window.open(doc.data().url);
});
}

/* EFFECTS */
function createEffects(){
for(let i=0;i<30;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerText="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(heart);

let bal=document.createElement("div");
bal.className="balloon";
bal.style.left=Math.random()*100+"vw";
bal.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(bal);
}
}

</script>

</body>
</html>
