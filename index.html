<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klara & Bruno 💍</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#fdf8f3;
color:#5a4636;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
background:url("hero.jpg") center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
color:white;
}

input{
padding:12px;
border-radius:25px;
border:none;
margin:10px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#c6a46c,#e8c88a);
color:white;
margin:10px;
cursor:pointer;
}

/* HERO */
.hero{
background:url("hero1.jpg") center/cover;
height:50vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
gap:10px;
padding:15px;
}

.gallery img,.gallery video{
width:100%;
border-radius:10px;
}

/* LIGHTBOX */
#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

#viewer{
max-width:90%;
max-height:90%;
}

/* HEARTS */
.heart{
position:fixed;
color:white;
animation:floatUp linear infinite;
}

@keyframes floatUp{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}
</style>
</head>

<body>

<div id="login">
<h1>Klara & Bruno 💍</h1>
<input type="password" id="pass" placeholder="Lozinka">
<button onclick="enter()">Uđi</button>
</div>

<div class="hero">
<h1>Klara & Bruno</h1>
<p>Hvala što ste dio našeg dana 💛</p>
</div>

<div style="text-align:center;">
<input type="text" id="username" placeholder="Vaše ime">
<button onclick="upload()">📸 Dodaj</button>
<button onclick="downloadZip()">📦 ZIP</button>
</div>

<input type="file" id="file" multiple accept="image/*,video/*" hidden>

<div class="gallery" id="gallery"></div>

<div id="lightbox" onclick="closeLightbox()">
<div id="viewer"></div>
</div>

<audio id="music" loop>
<source src="paulyudin-wedding-485932.mp3">
</audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyCuLdrkcZ2JVSZ78I5b6H8waU-IPMyCjwI",
authDomain: "trenutakviseqr-9d521.firebaseapp.com",
projectId: "trenutakviseqr-9d521",
storageBucket: "trenutakviseqr-9d521.firebasestorage.app",
appId: "1:578545655511:web:4ee1996961004f783eda92"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

/* LOGIN */
function enter(){
if(pass.value==="svadba2026"){
login.style.display="none";
music.play();
loadGallery();
}
}

/* UPLOAD MULTI */
function upload(){
file.click();
}

file.addEventListener("change", async e=>{
let files=[...e.target.files];
let name=username.value||"Gost";

for(let f of files){

if(f.size > 20*1024*1024){
alert("Max 20MB!");
continue;
}

let ref=storage.ref("wedding/"+Date.now()+"_"+f.name);
await ref.put(f);
let url=await ref.getDownloadURL();

await db.collection("photos").add({
url,name,type:f.type,created:Date.now()
});
}
});

/* LOAD OPTIMIZED */
function loadGallery(){
db.collection("photos")
.orderBy("created","desc")
.limit(200)
.onSnapshot(snap=>{
gallery.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();

let el = d.type.startsWith("video")
? document.createElement("video")
: document.createElement("img");

el.src=d.url;
el.loading="lazy";
el.onclick=()=>openViewer(d.url,d.type);

gallery.appendChild(el);
});
});
}

/* LIGHTBOX + SWIPE */
let startX=0;

function openViewer(url,type){
viewer.innerHTML="";
let el = type.startsWith("video")
? document.createElement("video")
: document.createElement("img");

el.src=url;
el.controls=true;
viewer.appendChild(el);

lightbox.style.display="flex";
}

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

lightbox.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(endX-startX>50) console.log("prev");
if(startX-endX>50) console.log("next");
});

function closeLightbox(){
lightbox.style.display="none";
}

/* ZIP CALL */
function downloadZip(){
window.open("https://YOUR_FUNCTION_URL/downloadZip");
}

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerText="❤";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(h);

setTimeout(()=>h.remove(),8000);
},500);

</script>

</body>
</html>
